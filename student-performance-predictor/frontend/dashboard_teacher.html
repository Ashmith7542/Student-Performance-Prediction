<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="navbar.css">
</head>
<body onload="loadNavbar();">

<nav class="navbar">

    <div class="nav-left">
        <img src="/student-performance-predictor/Logo.png" class="nav-logo" width="70">
        <span class="welcome-text">
            Welcome, <span id="navUsername"></span>
        </span>
    </div>

    <div class="nav-right">

        <div class="profile-wrapper">
            <div class="profile-circle" id="profileCircle" onclick="toggleProfileMenu()"></div>

            <div class="profile-dropdown" id="profileDropdown">

                <div class="profile-header">
                    <div class="profile-large" id="profileLarge"></div>
                    <span id="dropdownUsername"></span>
                </div>

                <div class="dropdown-divider"></div>

                <button onclick="openSettings()">⚙ Settings</button>
                <button onclick="openProfileUpdate()">👤 Profile Update</button>
                <button onclick="logout()">🚪 Logout</button>

            </div>
        </div>

    </div>

</nav>

<div class="main-container">

    <h1>Upload Student Marks</h1>

    <div class="glass-card">
        <input type="text" id="student" placeholder="Student Username">
        <input type="number" id="english" placeholder="English Marks">
        <input type="number" id="mathematics" placeholder="Mathematics Marks">
        <input type="number" id="physics" placeholder="Physics Marks">
        <input type="number" id="chemistry" placeholder="Chemistry Marks">

        <button onclick="uploadMarks()" class="submit-btn">
            Upload Marks
        </button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
